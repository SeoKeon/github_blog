<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SeoKeon GitHub Blog</title>
  <style>
    :root { --bg:#f6f8fb; --fg:#17212b; --card:#ffffff; --line:#d7e0eb; --accent:#0a66c2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Segoe UI, sans-serif; color:var(--fg); background:linear-gradient(180deg,#eef3f9 0%, #f8fbff 100%); }
    .wrap { max-width:760px; margin:48px auto; padding:0 16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px; }
    h1 { margin:0 0 8px; }
    p { line-height:1.6; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .muted { color:#536273; font-size:14px; margin-top:14px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>SeoKeon GitHub Blog</h1>
      <p>블로그 페이지가 정상 배포되었습니다.</p>
      <p>저장소: <a href="https://github.com/SeoKeon/github_blog">github.com/SeoKeon/github_blog</a></p>
      <p class="muted">GitHub Pages 배포 대상: <code>/github_blog/</code></p>
    </section>
  </main>
</body>
</html>
